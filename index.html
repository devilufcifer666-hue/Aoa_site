<h1>Atassia-Aprassia Oculomotoria (AOA)</h1>

<p>
Ho una rara malattia neurologica chiamata AOA.
</p>

<p>
Questa condizione può influenzare:
</p>

<ul>
<li>equilibrio</li>
<li>coordinazione</li>
<li>camminata</li>
<li>movimenti oculari</li>
</ul>

<p>
I miei movimenti non sono causati da alcol o droghe.
</p>
